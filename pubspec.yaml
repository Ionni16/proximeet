name: ProxiMeet
description: "ProxiMeet - Proximity networking for conferences"
publish_to: 'none'

version: 1.0.0+37

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Firebase
  firebase_core: ^3.13.0
  firebase_auth: ^5.5.2
  cloud_firestore: ^5.6.6
  firebase_storage: ^12.4.5
  firebase_messaging: ^15.2.5
  cloud_functions: ^5.2.1      # ← NUOVO: per chiamare linkedinAuth

  # Permessi
  permission_handler: ^11.3.1
  device_info_plus: ^10.1.0

  # BLE
  flutter_blue_plus: ^1.35.3
  flutter_ble_peripheral: ^2.1.0

  # QR
  mobile_scanner: ^7.0.0
  qr_flutter: ^4.1.0

  # Immagini
  cached_network_image: ^3.4.1
  image_picker: ^1.1.2

  # OAuth WebView (per LinkedIn login)
  webview_flutter: ^4.10.0    # ← NUOVO: webview per OAuth LinkedIn

  # Utility
  intl: ^0.20.2
  uuid: ^4.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/app_icon.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
