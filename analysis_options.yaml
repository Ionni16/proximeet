# Configurazione dell'analyzer Dart/Flutter.
# Eseguito da IDE e da `flutter analyze`.
#
# Partiamo dalle regole consigliate di flutter_lints e aggiungiamo alcuni
# lint moderati che migliorano qualità e leggibilità senza essere invasivi
# né rumorosi sul codice esistente.

include: package:flutter_lints/flutter.yaml

linter:
  rules:
    # Stile import: ordinati e raggruppati.
    directives_ordering: true
    # Evidenzia Future create e non attese senza unawaited().
    unawaited_futures: true
    # Preferenze di leggibilità/consistenza.
    prefer_final_locals: true
    avoid_unnecessary_containers: true
    sized_box_for_whitespace: true
    use_super_parameters: true
    # Sicurezza/correttezza.
    avoid_empty_else: true
    cancel_subscriptions: true
    close_sinks: true
    no_adjacent_strings_in_list: true
    throw_in_finally: true
